wheel_odom_node:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 115200
    wheel_radius: 0.08255      # m — từ URDF
    wheel_base: 0.42109        # m — wheel_separation
    publish_tf: false          # EKF sẽ publish TF, không để node này publish
    odom_frame: "odom"
    base_frame: "base_footprint"