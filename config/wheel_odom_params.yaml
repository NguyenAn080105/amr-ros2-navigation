wheel_odom_node:
  ros__parameters:
    serial_port: "/dev/ttyWheel"
    baud_rate: 115200
    wheel_radius: 0.08255      # [m] from URDF
    wheel_base: 0.42109        # [m] wheel_separation
    publish_tf: false          # EKF publishes TF; disable publishing here
    odom_frame: "odom"
    base_frame: "base_footprint"