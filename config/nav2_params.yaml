# ==================== CONTROLLER SERVER (DWB) ====================
# Dynamic Window Approach (DWB) local planner - samples (vx, w) pairs,
# simulates forward, scores via critics, and outputs best cmd_vel.
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0       # [Hz] cmd_vel output frequency

    # Velocity thresholds below which the robot is considered stationary.
    min_x_velocity_threshold: 0.001  # [m/s]
    min_y_velocity_threshold: 0.001  # [m/s] (unused - diff-drive)
    min_theta_velocity_threshold: 0.001 # [rad/s]

    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False

      # ── Velocity Limits ───────────────────────────────────────────────────
      # Hardware v_max = 0.5 m/s; reduced by 30% for safety -> 0.346 m/s
      min_vel_x: 0.0               # [m/s] disable reverse driving
      min_vel_y: 0.0               # [m/s] no strafing (diff-drive)
      max_vel_x: 0.346             # [m/s] max forward velocity
      max_vel_y: 0.0               # [m/s] no strafing (diff-drive)
      max_vel_theta: 1.643         # [rad/s] max angular velocity (~ hardware limit)
      min_vel_theta: 0.0
      min_speed_xy: 0.0            # [m/s] min combined XY speed
      max_speed_xy: 0.346          # [m/s] max combined XY speed
      min_speed_theta: 0.0

      # ── Acceleration / Deceleration Limits ──────────────────────────────
      # Gentle acceleration ramps to prevent wheel slip and reduce IMU vibration noise.
      acc_lim_x: 0.0865            # [m/s^2] 0 to max in ~4s
      acc_lim_y: 0.0               # [m/s^2] diff-drive
      acc_lim_theta: 1.0           # [rad/s^2]

      decel_lim_x: -0.172          # [m/s^2] braking ramp (2x accel for tighter stops)
      decel_lim_y: 0.0
      decel_lim_theta: -0.821      # [rad/s^2]

      # ── Trajectory Sampling ───────────────────────────────────────────────
      vx_samples: 20               # number of linear velocity samples in dynamic window
      vy_samples: 0                # no strafe sampling
      vtheta_samples: 20           # number of angular velocity samples

      # ── Forward Simulation ────────────────────────────────────────────────
      sim_time: 2.5                # [s] rollout horizon length
      linear_granularity: 0.05     # [m] arc step size for collision checking
      angular_granularity: 0.025   # [rad] angular step size for collision checking
      transform_tolerance: 0.3     # [s] TF lookup age tolerance
      trans_stopped_velocity: 0.02 # [m/s] considered stopped below this threshold
      short_circuit_trajectory_evaluation: True # abort scoring instantly upon hitting lethal cost
      stateful: True               # retain last best trajectory across ticks

      # ── Goal Tolerance ────────────────────────────────────────────────────
      xy_goal_tolerance: 0.25      # [m] goal position tolerance
      yaw_goal_tolerance: 0.25     # [rad] goal orientation tolerance (~14 deg)

      # ── Scoring Functions (Critics) ───────────────────────────────────────
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      BaseObstacle.scale: 32.0               # penalty for nearing lethal/inflated obstacles
      PathAlign.scale: 32.0                  # penalty for deviating from global path
      PathAlign.forward_point_distance: 0.1  # [m] lookahead distance for path alignment
      GoalAlign.scale: 12.0                  # penalty for deviating from goal orientation
      GoalAlign.forward_point_distance: 0.1  # [m]
      PathDist.scale: 32.0                   # penalty for cross-track error to global path
      GoalDist.scale: 24.0                   # penalty for Euclidean distance to goal
      RotateToGoal.scale: 32.0               # encourages in-place rotation near goal
      RotateToGoal.slowing_factor: 2.0       # velocity deceleration factor during rotation
      RotateToGoal.lookahead_time: -1.0      # negative -> disabled

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

# ==================== LOCAL COSTMAP ====================
# Rolling window costmap centered on robot - used by DWB for collision avoidance.
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: odom             # costmap tracks robot in odom frame
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      rolling_window: true           # window moves with robot
      width: 5                       # [m] window width
      height: 5                      # [m] window height
      resolution: 0.05               # [m/cell]
      # Robot footprint polygon in base_footprint frame [front->back, left->right].
      footprint: "[[0.32, 0.30], [0.32, -0.30], [-0.12, -0.30], [-0.12, 0.30]]"
      update_frequency: 20.0         # [Hz] must match controller_frequency
      publish_frequency: 5.0         # [Hz] RViz update frequency

      obstacle_layer:
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0   # [m] ignore reflections above this height (ceiling lights, fixtures)
          clearing: True             # raytrace to clear free space
          marking: True              # mark occupied cells on reflection
          data_type: "LaserScan"
          raytrace_max_range: 5.5    # [m] max raytracing range for clearing
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0    # [m] max obstacle marking range
          obstacle_min_range: 0.0

      inflation_layer:
        cost_scaling_factor: 3.5     # exponential rate of cost decay
        inflation_radius: 0.35       # [m] inflation radius around obstacles

      always_send_full_costmap: True

# ==================== GLOBAL COSTMAP ====================
# Full map static + dynamic costmap - used by NavFn/A* global planner.
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: map              # anchored to static map frame
      footprint: "[[0.32, 0.30], [0.32, -0.30], [-0.12, -0.30], [-0.12, 0.30]]"
      resolution: 0.05               # [m/cell]
      robot_base_frame: base_footprint
      update_frequency: 8.0          # [Hz] lower than local (global replanning is slower)
      publish_frequency: 2.0         # [Hz]

      plugin_names: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugin_types:
        - "nav2_costmap_2d::StaticLayer"
        - "nav2_costmap_2d::ObstacleLayer"
        - "nav2_costmap_2d::InflationLayer"

      static_layer:
        map_subscribe_transient_local: True  # use latched/transient-local QoS for /map topic

      obstacle_layer:
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.5   # [m] wider clearing range for global map
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0   # [m] wider obstacle marking range for global map
          obstacle_min_range: 0.0

      inflation_layer:
        cost_scaling_factor: 3.5
        inflation_radius: 0.35       # [m]

      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

# ==================== MAP SERVER ====================
map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "/home/nguyenan/mbrobot_ws/src/mobile_robot/maps/lab_demo_map.yaml"

# ==================== PLANNER SERVER ====================
# NavFn Global Planner - computes collision-free path on global costmap.
planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 5.0  # [Hz] goal replanning frequency
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25                # [m] endpoint search tolerance
      use_astar: true                # A* is faster than Dijkstra for indoor maps
      allow_unknown: False           # forbid planning through unknown space

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

navfn_planner_GetCostmap_client:
  ros__parameters:
    use_sim_time: False

# ==================== RECOVERIES SERVER ====================
# Executes recovery behaviors when robot is stuck or goal is unreachable.
recoveries_server:
  ros__parameters:
    use_sim_time: False
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0            # [Hz] recovery execution loop frequency

    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"    # rotate in-place to clear space
    backup:
      plugin: "nav2_recoveries/BackUp"  # reverse short distance to un-stick
    wait:
      plugin: "nav2_recoveries/Wait"    # pause to let dynamic obstacles pass

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1         # [s] TF tolerance during recovery

    simulate_ahead_time: 2.0         # [s] forward collision check before recovery execution

    # Angular velocity envelope for Spin recovery.
    max_rotational_vel: 1.0          # [rad/s] max angular speed
    min_rotational_vel: 0.4          # [rad/s] min angular speed to overcome static friction
    rotational_acc_lim: 0.8          # [rad/s^2] gentle acceleration to reduce IMU noise


# ==================== LIFECYCLE MANAGER ====================
# Orchestrates Nav2 node lifecycle transitions (configure -> activate -> deactivate).
lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: True                  # auto-activate all managed nodes on startup
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - bt_navigator
      - recoveries_server

lifecycle_manager_service_client:
  ros__parameters:
    use_sim_time: False

lifecycle_manager_client_service_client:
  ros__parameters:
    use_sim_time: False