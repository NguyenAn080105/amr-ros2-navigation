# ==================== LIFECYCLE MANAGER ====================
lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: True
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - bt_navigator
      - recoveries_server

lifecycle_manager_service_client:
  ros__parameters:
    use_sim_time: False

lifecycle_manager_client_service_client:
  ros__parameters:
    use_sim_time: False