# ==================== AMCL ====================
amcl:
  ros__parameters:
    use_sim_time: False
    set_initial_pose: True
    initial_pose_x: -3.89858
    initial_pose_y: -7.20180
    initial_pose_z: 0.0
    initial_pose_yaw: -0.38

    alpha1: 0.5
    alpha2: 0.3
    alpha3: 0.3
    alpha4: 0.5
    alpha5: 0.3

    base_frame_id: "base_footprint"

    beam_skip_distance: 0.3
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: True

    global_frame_id: "map"

    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 14.9
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 60
    
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: "differential"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.2
    update_min_a: 0.1
    update_min_d: 0.1
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.4
    z_short: 0.05
    scan_topic: /scan_filtered

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

# ==================== BT NAVIGATOR ====================
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 5
    default_server_timeout: 10
    default_bt_xml_filename: "/opt/ros/foxy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"
    enable_groot_monitoring: False
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

# ==================== CONTROLLER SERVER (DWB) ====================
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False

      # --- Velocity limits ---
      min_vel_x: -0.1
      min_vel_y: 0.0
      max_vel_x: 0.346
      max_vel_y: 0.0
      max_vel_theta: 1.643
      min_vel_theta: 0.0
      min_speed_xy: 0.0
      max_speed_xy: 0.346
      min_speed_theta: 0.0

      # --- Acceleration limits ---
      acc_lim_x: 0.0865
      acc_lim_y: 0.0
      acc_lim_theta: 1.0

      decel_lim_x: -0.172
      decel_lim_y: 0.0
      decel_lim_theta: -0.821

      # --- Sampling ---
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 24

      # --- Trajectory simulation ---
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      trans_stopped_velocity: 0.02
      short_circuit_trajectory_evaluation: True
      stateful: False

      # --- Goal tolerance ---
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

      # --- Critics ---
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 32.0
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 12.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

# ==================== LOCAL COSTMAP ====================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: odom
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types: ["nav2_costmap_2d::ObstacleLayer", "nav2_costmap_2d::InflationLayer"]
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.32, 0.30], [0.32, -0.30], [-0.12, -0.30], [-0.12, 0.30]]"
      update_frequency: 10.0
      publish_frequency: 5.0
      obstacle_layer:
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      inflation_layer:
        cost_scaling_factor: 3.5
        inflation_radius: 0.5
      always_send_full_costmap: True

# ==================== GLOBAL COSTMAP ====================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: map
      footprint: "[[0.32, 0.30], [0.32, -0.30], [-0.12, -0.30], [-0.12, 0.30]]"
      resolution: 0.05
      robot_base_frame: base_footprint
      update_frequency: 8.0
      publish_frequency: 3.0

      plugin_names: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugin_types:
        - "nav2_costmap_2d::StaticLayer"
        - "nav2_costmap_2d::ObstacleLayer"
        - "nav2_costmap_2d::InflationLayer"
      static_layer:
        map_subscribe_transient_local: True
      obstacle_layer:
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.5
          raytrace_min_range: 0.0
          obstacle_max_range: 10
          obstacle_min_range: 0.0
      inflation_layer:
        cost_scaling_factor: 3.5
        inflation_radius: 0.5
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

# ==================== MAP SERVER ====================
map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

# ==================== PLANNER SERVER ====================
planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

navfn_planner_GetCostmap_client:
  ros__parameters:
    use_sim_time: False

# ==================== RECOVERIES SERVER ====================
recoveries_server:
  ros__parameters:
    use_sim_time: False
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 0.8     # old value: 3.2

# # ==================== ROBOT STATE PUBLISHER ====================
