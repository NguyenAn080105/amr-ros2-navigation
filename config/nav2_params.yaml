# ==================== AMCL ====================
amcl:
  ros__parameters:
    use_sim_time: False
    set_initial_pose: False
    # initial_pose_x: -3.89858
    # initial_pose_y: -7.20180
    # initial_pose_z: 0.0
    # initial_pose_yaw: -0.38

    # Odometry motion model noise (differential drive).
    # alpha1: rot->rot | alpha2: trans->rot | alpha3: trans->trans | alpha4: rot->trans | alpha5: strafing (unused)
    alpha1: 0.5   # rotational noise from rotation
    alpha2: 0.3   # rotational noise from translation
    alpha3: 0.3   # translational noise from translation
    alpha4: 0.5   # translational noise from rotation
    alpha5: 0.3   # unused for diff-drive

    base_frame_id: "base_footprint"

    # Beam skipping: ignore beams hitting dynamic/unexpected obstacles (e.g., people, glass).
    beam_skip_distance: 0.3        # [m] max distance error to skip a beam
    beam_skip_error_threshold: 0.9 # [0-1] max fraction of skipped beams before disabling the mechanism
    beam_skip_threshold: 0.3       # [0-1] ratio of beams required to trigger skipping
    do_beamskip: True

    global_frame_id: "map"

    lambda_short: 0.1              # exponential decay for short readings model
    laser_likelihood_max_dist: 2.0 # [m] max distance for likelihood field lookup
    laser_max_range: 14.9          # [m] max effective range for AMCL (< RPLIDAR S2E 30m limit)
    laser_min_range: 0.07          # [m] min effective range (approx. laser_filter lower bound)
    laser_model_type: "likelihood_field" # preferred model for 2D indoor environments

    # Subsampled beams per update
    max_beams: 120                 # max beams used for filter update
    
    max_particles: 2000            # upper bound of particles - accuracy ceiling
    min_particles: 500             # lower bound of particles - CPU floor

    odom_frame_id: "odom"
    pf_err: 0.05                   # KLD target error
    pf_z: 0.99                     # KLD confidence (99%)

    # Fast/slow adaptive resampling weights (0 = disable random pose injection).
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    resample_interval: 1           # resample every N filter updates

    robot_model_type: "differential"

    save_pose_rate: 0.5            # [Hz] rate to save last known pose to parameter server
    sigma_hit: 0.2                 # [m] standard deviation of Gaussian hit model

    tf_broadcast: true             # AMCL publishes map -> odom TF
    transform_tolerance: 0.2       # [s] TF timestamp tolerance

    # Min motion to trigger filter update (prevents drift accumulation when stationary).
    update_min_a: 0.1              # [rad] min angular displacement
    update_min_d: 0.1              # [m] min linear displacement

    # Beam sensor model mixture weights (must sum to 1.0).
    z_hit: 0.5                     # weight: Gaussian hit model
    z_max: 0.05                    # weight: max range error model
    z_rand: 0.4                    # weight: uniform/random measurement model
    z_short: 0.05                  # weight: short unexpected obstacle model

    scan_topic: /scan_filtered     # uses filtered scan (robot body reflections removed)

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

