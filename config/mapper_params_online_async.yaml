slam_toolbox:
  ros__parameters:

    # ================================================================
    # Plugin params (Pose Graph Optimization solver parameters)
    # ================================================================
    solver_plugin: solver_plugins::CeresSolver 
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ================================================================
    # ROS Parameters (Topics and Transform Tree config)
    # ================================================================
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan_filtered
    mode: mapping              # Operating mode: 'mapping' (create new map) or 'localization' (localize in existing map).

    map_update_interval: 4.0          # [s] Occupancy Grid update frequency to /map topic. 

    # Triggers to process a new scan node into the pose graph:
    minimum_travel_distance: 0.2      # [m] Process new scan after 0.2m of travel. Highly responsive.
    minimum_time_interval: 0.5        # [s] Minimum time interval to process a scan.
    minimum_travel_heading: 0.5       # [rad] Process new scan after ~30 deg rotation. Crucial for diff-drive to not miss corners.
    
    throttle_scans: 1                 # Scans to skip (1 = process 100% of scans, suitable for Xavier).

    transform_publish_period: 0.02    # [s] SLAM TF odom->map publish rate (0.02s = 50Hz) for smooth Navigation.

    # ================================================================
    # MAP QUALITY
    # ================================================================
    resolution: 0.03                  # [m/cell] Grid resolution (3cm). Higher detail than default (5cm) for better obstacle avoidance. Jetson 16GB handles this well.
    max_laser_range: 20.0             # [m] Max LiDAR range for mapping. Suitable for wide indoor spaces (RPLIDAR S2E).

    # ================================================================
    # SCAN MATCHING (Aligning current LiDAR data with the map)
    # ================================================================
    use_scan_matching: true           # Enable scan matching to correct wheel/IMU odometry drift.
    use_scan_barycenter: true         # Use pointcloud barycenter to improve matching stability.

    scan_buffer_size: 100             # Scans retained in history buffer. Increased to 100 to handle sudden wheel slips better.
    scan_buffer_maximum_scan_distance: 12.0   # [m] Laser points beyond 12m are excluded from the local buffer.

    link_scan_maximum_distance: 2.0           # [m] Max distance between 2 poses to attempt establishing a constraint in the pose graph.
    link_match_minimum_response_fine: 0.05    # Minimum match score threshold to create a link. Lowered to 0.05 to facilitate easier pose connections.

    # ================================================================
    # LOOP CLOSURE (Detecting previously visited areas to eliminate drift)
    # ================================================================
    do_loop_closing: true                     # Enable loop closure. Essential for large maps.
    loop_search_maximum_distance: 4.0         # [m] Search radius for loop closure. Increased to 4m to catch old areas despite significant drift.
    loop_match_minimum_chain_size: 8          # Requires 8 consecutively successful scan matches to confirm a loop (prevents false positives in similar corridors).
    loop_match_maximum_variance_coarse: 3.0   # Max variance allowed during coarse search phase.
    loop_match_minimum_response_coarse: 0.25  # Minimum acceptable score for coarse search (lowered to 0.25 to catch familiar points easier).
    loop_match_minimum_response_fine: 0.35    # Minimum acceptable score for fine search.

    # ================================================================
    # CORRELATION (Fine-tuning the search space during Scan Matching)
    # ================================================================
    correlation_search_space_dimension: 0.8         # [m] Search space bounds (+- 80cm). Doubled to help SLAM recover alignment after sudden odometry jerks.
    correlation_search_space_resolution: 0.005      # [m] Search resolution (5mm). Extremely detailed, CPU-intensive but Jetson AGX Xavier handles it smoothly.
    correlation_search_space_smear_deviation: 0.05  # Search space smearing deviation to prevent algorithms from getting stuck in false local optima.

    # Similar parameters for Loop Closure (Wider and coarser space)
    loop_search_space_dimension: 8.0                # [m] Loop search bounds up to 8m.
    loop_search_space_resolution: 0.05              # [m] Loop search resolution (5cm).
    loop_search_space_smear_deviation: 0.03

    # ================================================================
    # SCAN MATCHER PENALTIES (Confidence evaluation & weighting)
    # ================================================================
    distance_variance_penalty: 0.5    # Penalty for high distance variance (Moderate trust in Odometry translation).
    angle_variance_penalty: 1.0       # Penalty for high angle variance. 1.0 heavily trusts Odometry heading (BNO055 provides highly accurate Yaw).
    fine_search_angle_offset: 0.00349 # [rad] Angular step for fine search (~0.2 deg).
    coarse_search_angle_offset: 0.523 # [rad] Large coarse search angle (up to 30 deg). Useful for correcting EKF predictions after sudden rotations.
    coarse_angle_resolution: 0.0349   # [rad] Angular resolution for coarse search (~2 deg).
    minimum_angle_penalty: 0.9        # Baseline angle penalty.
    minimum_distance_penalty: 0.5     # Baseline translation penalty.
    use_response_expansion: true      # Allow expanding the search space if the evaluation lacks confidence.

    # ================================================================
    # SYSTEM (Resources and Latency)
    # ================================================================
    transform_timeout: 1.0            # [s] Max time to wait for TF. Crucial in distributed systems to prevent node crashes due to network jitter.
    tf_buffer_duration: 50.0          # [s] Cache TF history for 50s for better time synchronization.
    stack_size_to_use: 40000000       # [Bytes] Allocate 40MB stack memory per Ceres solver thread.
    
    debug_logging: false              # Disable debug logging to disk. Reduces I/O bottleneck on Jetson's flash memory.
    enable_interactive_mode: false    # Disable manual map correction service via RViz. Dedicates full CPU to auto-mapping.